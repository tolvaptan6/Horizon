name: Triple Horizon Daily Briefing

on:
  schedule:
    # 07:00 Asia/Shanghai = 23:00 UTC on the previous day.
    - cron: "0 23 * * *"
  workflow_dispatch:

jobs:
  triple-daily:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write

    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      HORIZON_WEBHOOK_URL: ${{ secrets.HORIZON_WEBHOOK_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Run international news briefing
        run: |
          cp data/config-world.json data/config.json
          uv run horizon --hours 24

      - name: Run research briefing
        run: |
          cp data/config-research.json data/config.json
          uv run horizon --hours 24

      - name: Run medicine briefing
        run: |
          cp data/config-medicine.json data/config.json
          uv run horizon --hours 24

      - name: Set current date as environment variable
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true
          commit_message: "Daily triple briefing: ${{ env.DATE }}"
          publish_branch: gh-pages
          enable_jekyll: true
